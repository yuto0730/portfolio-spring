<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>項目追加 | My Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/skill-new.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="header-logo">My Portfolio</h1>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-header-btn">ログアウト</button>
            </form>
        </div>
    </header>

    <main class="main-wrapper">
        <h1 class="page-title">
            <span th:text="${categoryName}">カテゴリー名</span> に項目を追加
        </h1>

        <form class="add-form" th:action="@{/skill/new(month=${selectedMonth},categoryId=${param.categoryId})}" th:object="${skillAddForm}" method="post">
            
            <div class="form-group">
                <label for="name" class="form-label">項目名</label>
                <input type="text" th:field="*{name}" id="name" class="input-field">
                <p class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="form-group">
                <label for="studyTime" class="form-label">学習時間</label>
                <input type="number" th:field="*{study_time}" id="studyTime" class="input-field">
                <p class="form-note">分単位で入力してください</p>
                <p class="error-message" th:if="${#fields.hasErrors('study_time')}" th:errors="*{study_time}"></p>
            </div>

            <div class="button-container">
                <button type="submit" class="btn-submit">追加する</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p class="footer-text">portfolio site</p>
    </footer>

    <div class="modal-overlay" th:if="${isSuccess}">
        <div class="modal-content">
            <p class="modal-text">
                <span th:text="${categoryName} + ' に ' + ${skillAddForm.name} + ' を'"></span><br>
                <span th:text="${skillAddForm.study_time} + '分で追加しました！'"></span>
            </p>
            <a th:href="@{/skill/edit(month=${selectedMonth})}" class="button-blue">
                編集ページに戻る
            </a>
        </div>
    </div>
</body>
</html>
