<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>項目追加 | My Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/skill-new.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="header-logo">My Portfolio</h1>
            <button class="logout-header-btn">ログアウト</button>
        </div>
    </header>

    <main class="main-wrapper">
        <h1 class="page-title">
            <span th:text="${categoryName}">カテゴリー名</span> に項目を追加
        </h1>

        <form class="add-form" th:action="@{/skill/new}" th:object="${skillAddForm}" method="post">
            
            <div class="form-group">
                <label for="name" class="form-label">項目名</label>
                <input type="text" th:field="*{name}" id="name" class="input-field">
                <p class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="form-group">
                <label for="studyTime" class="form-label">学習時間</label>
                <input type="number" th:field="*{studyTime}" id="studyTime" class="input-field">
                <p class="form-note">分単位で入力してください</p>
                <p class="error-message" th:if="${#fields.hasErrors('studyTime')}" th:errors="*{studyTime}"></p>
            </div>

            <div class="button-container">
                <button type="submit" class="btn-submit">追加する</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p class="footer-text">portfolio site</p>
    </footer>
</body>
</html>
