<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 | My Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/signup.css}">
</head>

<body>
    <header class="header">
        <div class="header-container">
            <div class="header-logo">My Portfolio</div>
            <button type="button" class="login-header-btn">ログイン</button>
        </div>
    </header>

    <main>
        <div class="signup-container">
            <h2>新規登録</h2>
            
            <form th:action="@{/signup}" th:object="${user}" method="post" class="signup-form">
                
                <div class="form-group">
                    <label for="name">氏名</label>
                    <input type="text" th:field="*{name}" id="name">
                    <p class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" th:field="*{email}" id="email">
                    <p class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" th:field="*{password}" id="password">
                    <p class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <button type="submit" class="submit-btn">登録する</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>portfolio site</p>
        </div>
    </footer>
</body>
</html>
