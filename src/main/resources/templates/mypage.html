<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>マイページ | My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-logo">My Portfolio</div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-header-btn">ログアウト</button>
            </form>
        </div>
    </header>

    <main class="main-wrapper">
        
        <section class="profile-section">
            <div class="avatar-container">
                <div class="avatar-image-placeholder">
                    <img th:if="${userImage}" 
                         th:src="${userImage}" 
                         alt="プロフィール画像" 
                         class="avatar-image">
                </div>
                <p class="profile-user-name" th:text="${user.name}"></p>
            </div>

           <div class="intro-container">
                <h2 class="intro-title">自己紹介</h2>
                <div class="intro-text-box" th:text="${user.selfIntroduction}">
                    </div>
                <a th:href="@{/profile/edit}" class="profile-edit-btn">自己紹介を編集する</a>
            </div>
        </section>
        <div class="chart-section">
            <h2 class="chart-title">学習チャート</h2>
            <button class="chart-edit-btn">編集する</button>
        </div>
    </main>

    <footer class="footer">
        <p class="footer-text">
            portfolio site
            <span class="login-name" th:text="${user.name}"></span>
        </p>
    </footer>
</body>
</html>
