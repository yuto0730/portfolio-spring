<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>自己紹介を編集する | My Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/profile-edit.css}">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="header-logo">My Portfolio</h1>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-header-btn">ログアウト</button>
            </form>
        </div>
    </header>

    <main class="main-wrapper">
        <h2 class="page-title">自己紹介を編集する</h2>

        <form th:action="@{/profile/edit}" method="post" th:object="${profileEditForm}" enctype="multipart/form-data" class="edit-form">
            
            <div class="form-group">
                <label for="selfIntroduction" class="form-label">自己紹介文</label>
                <textarea id="selfIntroduction" th:field="*{selfIntroduction}" class="form-textarea"></textarea>
                
                <p class="helper-text">50文字以上、200文字以下で入力してください。</p>
                
                <div th:if="${#fields.hasErrors('selfIntroduction')}" th:errors="*{selfIntroduction}" class="error-message"></div>
            </div>

            <div class="form-group">
                <label class="form-label">アバター画像</label>

                <label for="profileImage" class="file-upload-btn">
                    画像ファイルを添付する
                    <input type="file" id="profileImage" name="profileImage" class="file-input" accept="image/*">
                </label>
                
                <span id="fileNameDisplay" class="file-name-display" th:text="*{profileImageName}"></span>
                
                <input type="hidden" th:field="*{profileImageName}">
            </div>

            <button type="submit" class="submit-btn">自己紹介を確定する</button>
        </form>
    </main>

    <footer class="footer">
        <p class="footer-text">portfolio site</p>
    </footer>

    <script>
        let imageInput = document.getElementById('profileImage');
        let nameDisplay = document.getElementById('fileNameDisplay');

        // 画像が新しく選ばれたときに動く処理
        imageInput.onchange = function() {
            if (imageInput.files.length > 0) {
                // 選ばれた新しいファイル名に書き換える
                nameDisplay.innerText = imageInput.files[0].name;
            }
        };
    </script>
</body>
</html>
