<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スキル編集 | My Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/skill-edit.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="header-logo">My Portfolio</h1>
            <button class="logout-header-btn">ログアウト</button>
        </div>
    </header>

    <main class="container">
        
        <div class="pull-down-container">
            <select class="month-pull-down">
                <option value="9">9月</option>
                <option value="8">8月</option>
                <option value="7">7月</option>
            </select>
        </div>

        <section class="category" th:each="category : ${categories}">
            
            <div class="title-container">
                <div class="title-group">
                    <h2 class="category-title" th:text="${category.name}">バックエンド</h2>
                    <div class="title-line"></div>
                </div>
                <button class="btn-add">項目を追加する</button>
            </div>

            </section>
    </main>

    <footer class="footer">
        <p class="footer-text">portfolio site</p>
    </footer>
</body>
</html>
