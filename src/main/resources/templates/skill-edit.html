<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スキル編集 | My Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/skill-edit.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="header-logo">My Portfolio</h1>
            <button class="logout-header-btn">ログアウト</button>
        </div>
    </header>

    <div class="main-wrapper">
        
        <div class="pull-down-container">
            <select class="month-pull-down" onchange="location.href='/skill/edit?month=' + this.value">
                <option th:each="month : ${months}" 
                        th:value="${month.getMonthValue()}" 
                        th:text="${month.getMonthValue() + '月'}"
                        th:selected="${month.getMonthValue() == selectedMonth}">
                </option>
            </select>
        </div>

        <div class="category-list">
            <section class="category" th:each="category : ${categories}">
                
                <div class="title-container">
                    <div class="title-group">
                        <h2 class="category-title" th:text="${category.name}"></h2>
                        <div class="title-line"></div>
                    </div>
                    <button class="btn-add" th:onclick="|location.href='@{/skill/new(month=${selectedMonth},categoryId=${category.id})}'|">
                        項目を追加する
                    </button>
                </div>

                <div class="card">
                    <table class="skill-table">
                        <thead>
                            <tr>
                                <th class="col-name">項目名</th>
                                <th class="col-time">学習時間</th>
                                <th class="col-action-save"></th>
                                <th class="col-action-delete"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="data : ${learningDataList}" th:if="${data.categoryId == category.id}">
                                <td class="col-name">
                                    <span class="item-name" th:text="${data.name}"></span>
                                </td>
                                <td class="col-time">
                                    <input type="number" name="studyTime" class="input-time" th:value="${data.studyTime}" th:form="'update-form-' + ${data.id}">
                                </td>
                                <td class="col-action-save">
                                    <form th:action="@{/skill/update}" method="post" th:id="'update-form-' + ${data.id}">
                                        <input type="hidden" name="id" th:value="${data.id}">
                                        <input type="hidden" name="selectedMonth" th:value="${selectedMonth}">
                                        <button type="submit" class="btn-save-time">学習時間を保存する</button>
                                    </form>
                                </td>
                                <td class="col-action-delete">
                                    <form th:action="@{/skill/delete}" method="post">
                                        <input type="hidden" name="id" th:value="${data.id}">
                                        <button type="submit" class="btn-delete-skill">削除する</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </section>
        </div>
    </div>

    <div class="modal-overlay" th:if="${isSuccess}">
        <div class="modal-content">
            <p class="modal-message">
                <span th:text="${updatedItemName}"></span>の学習時間を保存しました！
            </p>
            <a th:href="@{/skill/edit(month=${selectedMonth})}" class="btn-modal-back">編集ページに戻る</a>
        </div>
    </div>

    <footer class="footer">
        <p class="footer-text">portfolio site</p>
    </footer>

    <script>
        // 現在のスクロール位置をブラウザに記憶させる関数
        function saveScrollPosition() {
            sessionStorage.setItem("scrollPosition", window.scrollY);
        }

        // 保存ボタン（送信）を押した瞬間に記憶
        document.addEventListener("submit", saveScrollPosition);

        // モーダルの「編集ページに戻る」を押した瞬間に記憶
        const closeBtn = document.querySelector('.btn-modal-back');
        if (closeBtn) {
            closeBtn.addEventListener("click", saveScrollPosition);
        }

        //画面が新しく読み込まれた時、記憶したスクロール位置があれば復元する
        window.addEventListener("DOMContentLoaded", function() {
            const scrollPos = sessionStorage.getItem("scrollPosition");
            if (scrollPos !== null) {
                window.scrollTo(0, parseInt(scrollPos, 10));
                sessionStorage.removeItem("scrollPosition");
            }
        });
    </script>
</body>
</html>
