<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ログイン | My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/signup.css}">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-logo">My Portfolio</div>
        </div>
    </header>

    <main class="signup-container">
        <h2>ログイン</h2>
        
        <form th:action="@{/login}" method="post" class="signup-form">
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" name="username" required>
            </div>
            
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" required>
            </div>
            
            <p th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></p>

            <button type="submit" class="submit-btn">ログインする</button>
        </form>
        
        <a th:href="@{/signup}" class="submit-btn btn-signup-link">新規登録する</a>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>
                portfolio site
                <span class="login-name" sec:authentication="name"></span>
            </p>
        </div>
    </footer>
</body>
</html>
